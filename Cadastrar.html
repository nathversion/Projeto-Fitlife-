<!DOCTYPE html> <!-- Define o documento como HTML5 -->
<html lang="pt-br"> <!-- Define o idioma da página -->
<head> <!-- Cabeçalho do documento -->
  <meta charset="UTF-8"> <!-- Codificação de caracteres em UTF-8 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Responsivo para mobile -->
  <title>Cadastro - FitLife</title> <!-- Título da aba do navegador -->

  <!-- ------------------ começo do header ------------------ -->
  <link rel="stylesheet" href="Cadastrar.css"> <!-- Importa o CSS específico da página de cadastro -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"> <!-- Ícones Font Awesome -->
  <!-- ------------------ final do header  ------------------ -->
</head>
<body> <!-- Corpo da página -->

  <!-- ------------------ começo do container do formulário ------------------ -->
  <div class="login-container"> <!-- Container com rolagem para o formulário -->
    <h2>Cadastro - FitLife</h2> <!-- Título do formulário -->

    <form id="loginForm"> <!-- Formulário de cadastro com ID usado no JS -->
      <!-- Campo: Nome Completo -->
      <div class="form-group"> <!-- Agrupa label e input -->
        <label for="nomeCompleto">Nome Completo</label> <!-- Rótulo do campo -->
        <input type="text" id="nomeCompleto" placeholder="Digite seu nome completo"> <!-- Entrada de texto -->
      </div>

      <!-- Campo: Data de Nascimento -->
      <div class="form-group">
        <label for="dataNascimento">Data de Nascimento</label>
        <input type="date" id="dataNascimento"> <!-- Entrada do tipo data -->
      </div>

      <!-- Campo: Sexo -->
      <div class="form-group">
        <label for="sexo">Sexo</label>
        <select id="sexo"> <!-- Select para sexo -->
          <option value="">Selecione</option> <!-- Opção padrão -->
          <option value="masculino">Masculino</option>
          <option value="feminino">Feminino</option>
          <option value="outro">Outro</option>
        </select>
      </div>

      <!-- Campo: Nome Materno -->
      <div class="form-group">
        <label for="nomeMaterno">Nome Materno</label>
        <input type="text" id="nomeMaterno" placeholder="Digite o nome da mãe">
      </div>

      <!-- Campo: CPF -->
      <div class="form-group">
        <label for="cpf">CPF</label>
        <input type="text" id="cpf" placeholder="Digite seu CPF">
      </div>

      <!-- Campo: E-mail -->
      <div class="form-group">
        <label for="email">E-mail</label>
        <input type="email" id="email" placeholder="Digite seu e-mail">
      </div>

      <!-- Campo: Telefone Celular -->
      <div class="form-group">
        <label for="telefoneCelular">Telefone Celular</label>
        <input type="tel" id="telefoneCelular" placeholder="(xx) xxxxx-xxxx">
      </div>

      <!-- Campo: Telefone Fixo (opcional) -->
      <div class="form-group">
        <label for="telefoneFixo">Telefone Fixo</label>
        <input type="tel" id="telefoneFixo" placeholder="(xx) xxxx-xxxx">
      </div>

      <!-- Endereço: CEP -->
      <div class="form-group">
        <label for="cep">CEP</label>
        <input type="text" id="cep" placeholder="Digite o CEP">
      </div>

      <!-- Endereço: Rua -->
      <div class="form-group">
        <label for="rua">Rua</label>
        <input type="text" id="rua" placeholder="Digite o nome da rua">
      </div>

      <!-- Endereço: Bairro -->
      <div class="form-group">
        <label for="bairro">Bairro</label>
        <input type="text" id="bairro" placeholder="Digite o bairro">
      </div>

      <!-- Endereço: Cidade -->
      <div class="form-group">
        <label for="cidade">Cidade</label>
        <input type="text" id="cidade" placeholder="Digite a cidade">
      </div>

      <!-- Endereço: Estado -->
      <div class="form-group">
        <label for="estado">Estado</label>
        <input type="text" id="estado" placeholder="Digite o estado">
      </div>

      <!-- Campo: Senha -->
      <div class="form-group">
        <label for="senha">Senha</label>
        <input type="password" id="senha" placeholder="Digite sua senha"> <!-- Campo de senha -->
      </div>

      <!-- Campo: Confirmar Senha -->
      <div class="form-group">
        <label for="confirmarSenha">Confirme Sua Senha</label>
        <input type="password" id="confirmarSenha" placeholder="Confirme Sua Senha">
      </div>

      <!-- Botão de envio -->
      <button class="login-btn" type="submit">Cadastrar</button> <!-- Submete o formulário -->

      <!-- Mensagens -->
      <div class="error-msg" id="errorMsg"></div> <!-- Mensagem global de erro/sucesso -->
      <div id="mensagemSenha" class="mensagem-senha"></div> <!-- Mensagem auxiliar de senha -->
    </form>
  </div>
  <!-- ------------------ final do container do formulário ------------------ -->

  <!-- ------------------ começo do header ------------------ -->
  <header id="header"> <!-- Cabeçalho com logo e botão de modo escuro -->
    <div class="logo-container"> <!-- Container da logo -->
      <a href="index.html"> <!-- Link para a home -->
        <img src="img/ft.png.png" alt="Logo do site" class="logo-header"> <!-- Logo -->
      </a>
    </div>

    <button id="darkModeToggle" class="dark-mode-btn"> <!-- Botão do modo escuro -->
      <i class="fas fa-moon"></i> <!-- Ícone de lua -->
    </button>
  </header>
  <!-- ------------------ final do header  ------------------ -->

  <!-- ------------------ começo do script ------------------ -->
  <script src="JS/Cadastrar.js"></script> <!-- Importa o JavaScript do cadastro -->
  <!-- ------------------ final do script ------------------ -->

</body>
</html>
